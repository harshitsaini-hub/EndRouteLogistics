<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EndRouteLogistics • Backend Tester</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: 'Inter', system-ui, sans-serif; }
    .result { animation: fadeIn 0.3s ease-in; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  </style>
</head>
<body class="bg-gray-950 text-white min-h-screen py-12">
  <div class="max-w-2xl mx-auto px-6">
    <div class="flex items-center gap-3 mb-8">
      <div class="w-10 h-10 bg-emerald-500 rounded-2xl flex items-center justify-center text-2xl">📦</div>
      <h1 class="text-4xl font-bold">EndRouteLogistics</h1>
      <span class="px-3 py-1 text-xs bg-emerald-500/20 text-emerald-400 rounded-full font-medium">Backend Tester</span>
    </div>

    <div class="bg-gray-900 rounded-3xl p-8 shadow-2xl">
      <form id="analyzeForm" class="space-y-6">
        <div>
          <label class="block text-sm font-medium mb-2 text-gray-400">Origin City</label>
          <input type="text" id="origin" 
                 value="Delhi" 
                 class="w-full bg-gray-800 border border-gray-700 focus:border-emerald-500 rounded-2xl px-5 py-4 text-lg outline-none">
        </div>

        <div>
          <label class="block text-sm font-medium mb-2 text-gray-400">Destination City</label>
          <input type="text" id="destination" 
                 value="Mumbai" 
                 class="w-full bg-gray-800 border border-gray-700 focus:border-emerald-500 rounded-2xl px-5 py-4 text-lg outline-none">
        </div>

        <div>
          <label class="block text-sm font-medium mb-2 text-gray-400">Cargo Type</label>
          <select id="cargoType" 
                  class="w-full bg-gray-800 border border-gray-700 focus:border-emerald-500 rounded-2xl px-5 py-4 text-lg outline-none">
            <option value="Electronics">Electronics</option>
            <option value="Pharmaceuticals" selected>Pharmaceuticals</option>
            <option value="Perishable Food">Perishable Food</option>
            <option value="Chemicals">Chemicals</option>
            <option value="Furniture">Furniture</option>
            <option value="Textiles">Textiles</option>
          </select>
        </div>

        <button type="submit"
                class="w-full bg-emerald-500 hover:bg-emerald-600 transition-all font-semibold text-xl py-5 rounded-2xl flex items-center justify-center gap-3">
          <span>🚚 Analyze Route</span>
        </button>
      </form>

      <!-- Loading -->
      <div id="loading" class="hidden mt-8 flex items-center justify-center gap-3 text-emerald-400">
        <div class="w-5 h-5 border-4 border-emerald-400 border-t-transparent animate-spin rounded-full"></div>
        <span class="font-medium">Calling Gemini + Weather API...</span>
      </div>

      <!-- Result -->
      <div id="result" class="hidden result mt-8 bg-gray-950 border border-gray-700 rounded-3xl p-8">
        <h2 class="text-emerald-400 font-medium mb-4 flex items-center gap-2">
          <span>📋 AI Recommendation</span>
        </h2>
        <div id="recommendationText" class="text-lg leading-relaxed whitespace-pre-wrap"></div>
      </div>

      <!-- Error -->
      <div id="error" class="hidden mt-8 bg-red-950 border border-red-500 text-red-400 rounded-3xl p-6"></div>
    </div>

    <div class="text-center text-gray-500 text-sm mt-8">
      Backend URL: <span class="font-mono text-emerald-400">http://localhost:8080/api/analyze</span><br>
      Made for quick testing • Agile Sprint 1
    </div>
  </div>

  <script>
    const form = document.getElementById('analyzeForm');
    const loading = document.getElementById('loading');
    const resultDiv = document.getElementById('result');
    const recommendationText = document.getElementById('recommendationText');
    const errorDiv = document.getElementById('error');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      const origin = document.getElementById('origin').value.trim();
      const destination = document.getElementById('destination').value.trim();
      const cargoType = document.getElementById('cargoType').value;

      if (!origin || !destination || !cargoType) {
        showError("Please fill all fields");
        return;
      }

      // Reset UI
      loading.classList.remove('hidden');
      resultDiv.classList.add('hidden');
      errorDiv.classList.add('hidden');

      try {
        const response = await fetch('http://localhost:8080/api/analyze', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ origin, destination, cargoType })
        });

        if (!response.ok) throw new Error(`HTTP ${response.status}`);

        const data = await response.json();
        recommendationText.innerHTML = data.recommendation || "No recommendation received";
        
        resultDiv.classList.remove('hidden');
      } catch (err) {
        showError(err.message.includes('Failed to fetch') 
          ? "Backend not running!<br>Make sure Spring Boot is started on port 8080" 
          : err.message);
      } finally {
        loading.classList.add('hidden');
      }
    });

    function showError(msg) {
      errorDiv.innerHTML = `<strong>❌ Error:</strong><br>${msg}`;
      errorDiv.classList.remove('hidden');
    }

    // Bonus: Quick test buttons (optional)
    console.log('%c✅ Tester ready! Try changing cities/cargo and hit Analyze 🚀', 'color: #10b981; font-size: 13px');
  </script>
</body>
</html>
